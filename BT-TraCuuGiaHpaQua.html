<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Giá hoa quả</h2>
    <input type="text" name="" id="abc">
    <button onclick="xemgia()">Xem giá</button>
    <p id="def"></p>
</body>
</html>
<script>
    function xemgia() {
        let loaiqua = document.getElementById('abc').value;
        let hienthi = document.getElementById('def')
        switch (loaiqua) {
            case "Ổi":
                hienthi.innerHTML ="20000 VNĐ/kg";
                break;
            case "Dưa Hấu":
                hienthi.innerHTML ="25000 VNĐ/kg";
                break;
            case "Táo": 
                hienthi.innerHTML ="30000 VNĐ/kg";
                break;
            case "Xoài":   
                hienthi.innerHTML ="35000 VNĐ/kg";
                break;
            case "Cam": 
                hienthi.innerHTML ="40000 VNĐ/kg";
                break;
            case "Chôm Chôm": 
                hienthi.innerHTML ="45000 VNĐ/kg";
                break;
            case "Măng Cụt":
                hienthi.innerHTML ="50000 VNĐ/kg";
                break;
        } 
    }
    
</script>
